# e007-B — Contrastive-guided fine-tuning (TARGET MODEL). A + cross-corpus contrastive.
experiment:
  train_corpora: ["asvspoof5", "diffssd", "fakeorreal", "vctk"]
  manifest_dir: "manifests"
  data_root: ".."
  sample_rate: 16000
  duration_seconds: 4.0
  seed: 13
consistency:
  lambda_kl: 0.0
  lambda_emb: 0.0
loss_weights:
  cls: 1.0
  con: 1.0
spoof_pos_weight: 1.0
focal_gamma: 0.0
xc_contrastive:
  enabled: true
  lambda_xc: 0.5
  temperature: 0.1
  cross_corpus_only: true
  use_projection_head: true   # enable the projection seam for SupCon
train:
  batch_size: 16
  balanced_sampler: true
  head_lr: 1.0e-3
  backbone_lr: 1.0e-6
  weight_decay: 1.0e-4
  epochs: 30
  early_stopping_patience: 6
  num_workers: 0
  max_val_items_per_corpus: 2000
  max_steps_per_epoch: 1500
  unfreeze_top_k: 6
  no_amp: false
  probe_every_epoch: true
