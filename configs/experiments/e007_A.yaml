# e007-A — Backbone adaptation (CE only). Isolates the effect of unfreezing.
experiment:
  train_corpora: ["asvspoof5", "diffssd", "fakeorreal", "vctk"]
  manifest_dir: "manifests/v2"
  data_root: ".."          # SET on server to the dataset root
  sample_rate: 16000
  duration_seconds: 4.0
  seed: 13
consistency:
  lambda_kl: 0.0
  lambda_emb: 0.0
loss_weights:
  cls: 1.0
  con: 1.0
spoof_pos_weight: 1.0       # preserve AI4T (e005-C showed >1 trades it away)
focal_gamma: 0.0
xc_contrastive:
  enabled: false            # CE only for the adaptation baseline
train:
  batch_size: 16            # PLACEHOLDER — set via --override after memory smoke
  balanced_sampler: true
  head_lr: 1.0e-3           # literature ratio (high head / low backbone)
  backbone_lr: 1.0e-6       # conservative; minimal disruption of pretrained features
  weight_decay: 1.0e-4
  epochs: 30
  early_stopping_patience: 6
  num_workers: 8
  val_num_workers: 2
  max_val_items_per_corpus: 500
  max_steps_per_epoch: 750  # raise to 1500/2000 for final runs
  unfreeze_strategy: weighted_band
  unfreeze_layer_band: [8, 11]
  unfreeze_top_k: 4         # hidden states 8-11 -> encoder layers 7-10
  no_amp: true              # AMP produced non-finite gradients in smoke; override only after checking skip counters
  probe_every_epoch: false
