# AudioShield-X v1 model config. Chosen by the e000 layer probe:
# WavLM-large layer 10 gave the best mean cross-corpus dev EER (0.0138);
# layers 8-11 form a smooth plateau, so the learnable layer-weights are
# initialized as a soft band over [8,11] peaked at 10.
model:
  backbone_name: microsoft/wavlm-large
  backbone_hidden: 1024          # WavLM-large hidden size
  num_hidden_states: 25          # 24 transformer layers + embedding output
  layer_weight_init_center: 10   # peak of the softmax init band
  layer_weight_init_band: [8, 11]
  layer_weight_init_temp: 1.0    # higher = flatter init
  freeze_backbone: true          # UPC stage 1; e007 uses weighted-band unfreezing

  pooling: attentive_stats       # P3: attentive statistics pooling
  embedding_dim: 256

  prototypes:
    num_bona: 1                  # P3: single shared bona-fide prototype
    num_spoof: 8                 # P6: K spoof prototypes (K=8 optimal)
    aam_margin: 0.2              # angular margin
    aam_scale: 20.0              # cosine scale s

  bmi:
    domain_critic_hidden: 128    # critic for decision-level invariance
    num_bona_domains: 5          # librispeech, fakeorreal_real, asvspoof5_real, vctk, (+room to grow)
